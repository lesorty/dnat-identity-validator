<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DNAT Web CLI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg-0: #071827;
        --bg-1: #12304a;
        --bg-2: #0d4a5f;
        --surface: rgba(247, 251, 255, 0.96);
        --line: #c7d7e3;
        --ink: #122a3d;
        --muted: #557085;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 18%, rgba(245, 158, 11, 0.18), transparent 30%),
          radial-gradient(circle at 86% 10%, rgba(10, 147, 150, 0.2), transparent 28%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1) 58%, var(--bg-2));
      }
      .nav {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(3, 20, 33, 0.64);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 16px;
        display: flex;
        gap: 14px;
      }
      .nav a { color: #d7eef7; text-decoration: none; font-weight: 700; }
      .nav a.active { color: #ffffff; text-decoration: underline; }
      .wrap { max-width: 1040px; margin: 0 auto; padding: 26px 16px 30px; }
      .top { margin-bottom: 14px; color: #eff9ff; }
      .top p { margin: 6px 0 0; color: #bfdae8; }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
      }
      .grid { display: grid; gap: 10px; }
      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 10px;
      }
      label { font-size: 13px; color: var(--muted); font-weight: 700; }
      input, select, button {
        width: 100%;
        font: inherit;
        padding: 10px;
        border-radius: 9px;
        border: 1px solid #bdd0db;
      }
      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .checkbox input {
        width: 18px;
        height: 18px;
        margin: 0;
      }
      button {
        background: linear-gradient(120deg, #0a9396, #007b83);
        color: #fff;
        cursor: pointer;
        border: none;
        font-weight: 700;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #edf5fb;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cfdee8;
      }
      .muted { color: var(--muted); font-size: 14px; }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(160px, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .summary-item {
        background: #edf5fb;
        border: 1px solid #cfdee8;
        border-radius: 10px;
        padding: 12px;
      }
      .summary-item strong {
        display: block;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .summary-item span {
        font-size: 20px;
        font-weight: 700;
        color: var(--ink);
      }
      .status-success span { color: #0c7a43; }
      .status-failed span { color: #b42318; }
      .output-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 12px;
      }
      .panel-title {
        font-size: 13px;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .file-picker {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 8px 10px;
        border: 1px solid #bdd0db;
        border-radius: 11px;
        background: linear-gradient(180deg, #f8fcff, #eef5fb);
      }
      .file-picker input[type="file"] {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        width: 0;
        height: 0;
      }
      .file-picker-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 14px;
        border-radius: 9px;
        border: 1px solid #0f7f86;
        background: linear-gradient(120deg, #0a9396, #0d6e75);
        color: #fff;
        font-weight: 700;
        white-space: nowrap;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        cursor: pointer;
      }
      .file-picker-name {
        min-width: 0;
        color: var(--ink);
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .asset-choice-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .asset-choice-panel {
        border: 1px solid #cfdee8;
        background: #f8fbff;
        border-radius: 12px;
        padding: 12px;
      }
      .asset-choice-list {
        display: grid;
        gap: 8px;
        max-height: 280px;
        overflow: auto;
      }
      .asset-choice-item {
        border: 1px solid #c8d8e0;
        background: #fff;
        border-radius: 10px;
        padding: 10px;
        cursor: pointer;
      }
      .asset-choice-item.active {
        border-color: #0a9396;
        background: linear-gradient(120deg, #ecfeff, #f0fdfa);
      }
      .asset-choice-name {
        font-weight: 800;
        margin-bottom: 4px;
      }
      .asset-choice-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 12px;
        color: var(--muted);
      }
      .mini-tag {
        padding: 3px 8px;
        border-radius: 999px;
        background: #e2ecf2;
        color: #304959;
        font-weight: 700;
      }
      .selection-summary {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      @media (max-width: 780px) {
        .fields { grid-template-columns: 1fr; }
        .summary-grid,
        .output-grid,
        .asset-choice-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <a href="/" class="active">CLI</a>
      <a href="/assets.html">Assets</a>
      <a href="/executions.html">Executions</a>
    </div>
    <div id="root"></div>
    <script type="text/babel">
      const actions = [
        {
          key: "register-dataset",
          label: "1) Register Dataset",
          method: "POST",
          fields: [
            { name: "file", label: "Dataset File", type: "file", defaultValue: null },
            { name: "priceWei", label: "Price (wei)", type: "text", defaultValue: "0" },
            { name: "bloomFilter", label: "Bloom Filter", type: "text", defaultValue: "0x" },
            { name: "manifest.name", label: "Title", type: "text", defaultValue: "Dataset Title" },
            { name: "manifest.description", label: "Description", type: "text", defaultValue: "Dataset description" },
            { name: "manifest.version", label: "Version", type: "text", defaultValue: "1.0.0" },
            { name: "manifest.author", label: "Author", type: "text", defaultValue: "" },
            { name: "manifest.framework", label: "Framework", type: "text", defaultValue: "" },
            { name: "manifest.dependencies", label: "Dependencies (comma-separated or JSON array)", type: "text", defaultValue: "" },
          ],
        },
        {
          key: "register-application",
          label: "2) Register Application",
          method: "POST",
          fields: [
            { name: "file", label: "Application File", type: "file", defaultValue: null },
            { name: "priceWei", label: "Price (wei)", type: "text", defaultValue: "0" },
            { name: "manifest.name", label: "Title", type: "text", defaultValue: "Application Title" },
            { name: "manifest.description", label: "Description", type: "text", defaultValue: "Application description" },
            { name: "manifest.version", label: "Version", type: "text", defaultValue: "1.0.0" },
            { name: "manifest.author", label: "Author", type: "text", defaultValue: "" },
            { name: "manifest.framework", label: "Framework", type: "text", defaultValue: "" },
            { name: "manifest.dependencies", label: "Dependencies (comma-separated or JSON array)", type: "text", defaultValue: "" },
          ],
        },
        { key: "get-asset", label: "3) Get Asset", method: "POST", fields: [{ name: "assetId", label: "Asset ID", type: "text", defaultValue: "" }] },
        {
          key: "purchase-access",
          label: "4) Purchase Access",
          method: "POST",
          fields: [],
        },
        {
          key: "check-access-by-ids",
          label: "5) Check Access (by IDs)",
          method: "POST",
          fields: [
            { name: "user", label: "User Address", type: "text", defaultValue: "" },
            { name: "datasetId", label: "Dataset ID", type: "text", defaultValue: "" },
            { name: "applicationId", label: "Application ID", type: "text", defaultValue: "" },
          ],
        },
        {
          key: "check-access-by-uris",
          label: "6) Check Access (by URIs)",
          method: "POST",
          fields: [
            { name: "user", label: "User Address", type: "text", defaultValue: "" },
            { name: "datasetUri", label: "Dataset URI", type: "text", defaultValue: "" },
            { name: "applicationUri", label: "Application URI", type: "text", defaultValue: "" },
          ],
        },
        {
          key: "update-asset",
          label: "7) Update Asset",
          method: "POST",
          fields: [
            { name: "assetId", label: "Asset ID", type: "text", defaultValue: "" },
            { name: "newPriceWei", label: "New Price (wei)", type: "text", defaultValue: "0" },
            { name: "newActive", label: "Active", type: "checkbox", defaultValue: true },
          ],
        },
        { key: "revoke-asset", label: "8) Revoke Asset", method: "POST", fields: [{ name: "assetId", label: "Asset ID", type: "text", defaultValue: "" }] },
        { key: "list-my-purchases", label: "9) List My AccessPurchased Events", method: "GET", fields: [] },
        {
          key: "run-from-cids",
          label: "10) Run From CIDs",
          method: "POST",
          fields: [],
        },
        { key: "contract-info", label: "11) Show Contract Info", method: "GET", fields: [] },
        {
          key: "add-file-to-ipfs",
          label: "12) Add File To IPFS",
          method: "POST",
          fields: [
            { name: "file", label: "File", type: "file", defaultValue: null },
            { name: "manifest.name", label: "Title", type: "text", defaultValue: "" },
            { name: "manifest.description", label: "Description", type: "text", defaultValue: "" },
            { name: "manifest.version", label: "Version", type: "text", defaultValue: "1.0.0" },
            { name: "manifest.author", label: "Author", type: "text", defaultValue: "" },
            { name: "manifest.framework", label: "Framework", type: "text", defaultValue: "" },
            { name: "manifest.dependencies", label: "Dependencies (comma-separated or JSON array)", type: "text", defaultValue: "" },
          ],
        },
      ];

      function createInitialFieldState(action) {
        const out = {};
        for (const field of action.fields || []) out[field.name] = field.defaultValue;
        return out;
      }

      function setByPath(obj, path, value) {
        const parts = path.split(".");
        let cursor = obj;
        for (let i = 0; i < parts.length - 1; i += 1) {
          const key = parts[i];
          if (!cursor[key] || typeof cursor[key] !== "object") cursor[key] = {};
          cursor = cursor[key];
        }
        cursor[parts[parts.length - 1]] = value;
      }

      function actionUsesFileUpload(action) {
        return (action.fields || []).some((field) => field.type === "file");
      }

      function actionUsesAssetPairSelector(actionKey) {
        return actionKey === "run-from-cids" || actionKey === "purchase-access";
      }

      function shortText(text, max = 80) {
        const value = String(text || "").trim();
        if (!value) return "No description";
        return value.length > max ? `${value.slice(0, max)}...` : value;
      }

      function App() {
        const [actionKey, setActionKey] = React.useState(actions[0].key);
        const selected = actions.find((a) => a.key === actionKey);
        const [fieldValues, setFieldValues] = React.useState(createInitialFieldState(actions[0]));
        const [selectedFiles, setSelectedFiles] = React.useState({});
        const [assetCatalog, setAssetCatalog] = React.useState({ all: [], datasets: [], applications: [] });
        const [runSelection, setRunSelection] = React.useState({ dataset: null, application: null });
        const [purchaseSelection, setPurchaseSelection] = React.useState({ dataset: null, application: null });
        const [result, setResult] = React.useState(null);
        const [loading, setLoading] = React.useState(false);

        React.useEffect(() => {
          setFieldValues(createInitialFieldState(selected));
          setSelectedFiles({});
          setRunSelection({ dataset: null, application: null });
          setPurchaseSelection({ dataset: null, application: null });
        }, [actionKey]);

        React.useEffect(() => {
          if (!actionUsesAssetPairSelector(actionKey)) return;

          async function loadAssets() {
            try {
              const res = await fetch("/api/assets");
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || "Failed to load assets");
              setAssetCatalog(data);
            } catch (error) {
              setResult({ error: error.message });
            }
          }

          loadAssets();
        }, [actionKey]);

        function updateField(name, value) {
          setFieldValues((prev) => ({ ...prev, [name]: value }));
        }

        function updateFile(name, file) {
          setSelectedFiles((prev) => ({ ...prev, [name]: file || null }));
        }

        function isMissingRequiredFile() {
          return (selected.fields || []).some((field) => field.type === "file" && !selectedFiles[field.name]);
        }

        function isMissingRunSelection() {
          return actionKey === "run-from-cids" && (!runSelection.dataset || !runSelection.application);
        }

        function isMissingPurchaseSelection() {
          return actionKey === "purchase-access" && (!purchaseSelection.dataset || !purchaseSelection.application);
        }

        function buildPayload() {
          if (actionKey === "run-from-cids") {
            return {
              datasetId: String(runSelection.dataset?.id ?? ""),
              applicationId: String(runSelection.application?.id ?? ""),
            };
          }

          if (actionKey === "purchase-access") {
            return {
              datasetId: String(purchaseSelection.dataset?.id ?? ""),
              applicationId: String(purchaseSelection.application?.id ?? ""),
            };
          }

          const payload = {};
          for (const field of selected.fields || []) {
            if (field.type === "file") continue;
            setByPath(payload, field.name, fieldValues[field.name]);
          }
          return payload;
        }

        function buildFormData() {
          const formData = new FormData();
          for (const field of selected.fields || []) {
            if (field.type === "file") {
              const file = selectedFiles[field.name];
              if (file) formData.append(field.name, file, file.name);
              continue;
            }
            formData.append(field.name, fieldValues[field.name] ?? "");
          }
          return formData;
        }

        async function executeAction() {
          setLoading(true);
          try {
            if (isMissingRequiredFile()) {
              setResult({ error: "Select a file before executing this action." });
              return;
            }
            if (isMissingRunSelection()) {
              setResult({ error: "Select one dataset and one application before executing." });
              return;
            }
            if (isMissingPurchaseSelection()) {
              setResult({ error: "Select one dataset and one application before purchasing access." });
              return;
            }
            const usesFileUpload = actionUsesFileUpload(selected);
            const response = selected.method === "GET"
              ? await fetch(`/api/${selected.key}`)
              : usesFileUpload
                ? await fetch(`/api/${selected.key}`, {
                    method: "POST",
                    body: buildFormData(),
                  })
                : await fetch(`/api/${selected.key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(buildPayload()),
                  });

            const data = await response.json();
            setResult(data);
          } catch (error) {
            setResult({ error: error.message });
          } finally {
            setLoading(false);
          }
        }

        function renderRunFromCidsResult(data) {
          if (!data || typeof data !== "object") return null;

          const metadata = data.metadata || {};
          const status = metadata.status || "unknown";
          const returnCode = metadata.returnCode ?? data.exitCode ?? "n/a";
          const output = data.stdout || "";
          const errorOutput = data.stderr || "";
          const runnerOutput = data.runnerStdout || "";
          const runnerErrorOutput = data.runnerStderr || "";
          const statusClass = status === "success" ? "status-success" : "status-failed";

          return (
            <div>
              <div className="summary-grid">
                <div className={`summary-item ${statusClass}`}>
                  <strong>Status</strong>
                  <span>{status}</span>
                </div>
                <div className="summary-item">
                  <strong>Return</strong>
                  <span>{String(returnCode)}</span>
                </div>
                <div className="summary-item">
                  <strong>Execution</strong>
                  <span style={{ fontSize: "14px" }}>{metadata.executionId || "n/a"}</span>
                </div>
              </div>

              <div className="output-grid">
                <div>
                  <div className="panel-title">Command Output</div>
                  <pre>{output || "No stdout"}</pre>
                </div>
                <div>
                  <div className="panel-title">Command Error Output</div>
                  <pre>{errorOutput || "No stderr"}</pre>
                </div>
              </div>

              <div style={{ marginTop: 12 }}>
                <div className="panel-title">Runner Output</div>
                <pre>{runnerOutput || "No runner stdout"}</pre>
              </div>

              <div style={{ marginTop: 12 }}>
                <div className="panel-title">Runner Error Output</div>
                <pre>{runnerErrorOutput || "No runner stderr"}</pre>
              </div>

              <div style={{ marginTop: 12 }}>
                <div className="panel-title">Full Response</div>
                <pre>{JSON.stringify(data, null, 2)}</pre>
              </div>
            </div>
          );
        }

        function renderResult() {
          if (!result) return "{}";
          if (selected.key === "run-from-cids" && typeof result === "object") {
            return renderRunFromCidsResult(result);
          }
          return <pre>{JSON.stringify(result, null, 2)}</pre>;
        }

        function renderRunFromCidsPicker() {
          return (
            <div className="grid">
              <div className="asset-choice-grid">
                <section className="asset-choice-panel">
                  <label>Datasets</label>
                  <div className="asset-choice-list" style={{ marginTop: 8 }}>
                    {assetCatalog.datasets.length === 0 && <div className="muted">No datasets found.</div>}
                    {assetCatalog.datasets.map((item) => (
                      <div
                        key={`dataset-${item.id}`}
                        className={`asset-choice-item ${runSelection.dataset?.id === item.id ? "active" : ""}`}
                        onClick={() => setRunSelection((prev) => ({ ...prev, dataset: item }))}
                      >
                        <div className="asset-choice-name">{item.title || `Dataset #${item.id}`}</div>
                        <div className="muted">{shortText(item.description)}</div>
                        <div className="asset-choice-meta" style={{ marginTop: 8 }}>
                          <span className="mini-tag">ID {item.id}</span>
                          <span className="mini-tag">{item.priceWei} wei</span>
                          <span className="mini-tag">{item.active ? "Active" : "Inactive"}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>

                <section className="asset-choice-panel">
                  <label>Applications</label>
                  <div className="asset-choice-list" style={{ marginTop: 8 }}>
                    {assetCatalog.applications.length === 0 && <div className="muted">No applications found.</div>}
                    {assetCatalog.applications.map((item) => (
                      <div
                        key={`application-${item.id}`}
                        className={`asset-choice-item ${runSelection.application?.id === item.id ? "active" : ""}`}
                        onClick={() => setRunSelection((prev) => ({ ...prev, application: item }))}
                      >
                        <div className="asset-choice-name">{item.title || `Application #${item.id}`}</div>
                        <div className="muted">{shortText(item.description)}</div>
                        <div className="asset-choice-meta" style={{ marginTop: 8 }}>
                          <span className="mini-tag">ID {item.id}</span>
                          <span className="mini-tag">{item.priceWei} wei</span>
                          <span className="mini-tag">{item.active ? "Active" : "Inactive"}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              </div>

              <div className="selection-summary">
                <div className="muted">
                  Selected dataset: {runSelection.dataset ? `${runSelection.dataset.title || `Dataset #${runSelection.dataset.id}`} (ID ${runSelection.dataset.id})` : "none"}
                </div>
                <div className="muted">
                  Selected application: {runSelection.application ? `${runSelection.application.title || `Application #${runSelection.application.id}`} (ID ${runSelection.application.id})` : "none"}
                </div>
              </div>
            </div>
          );
        }

        function renderAssetPairSelector(selection, setSelection, summaryLabels) {
          return (
            <div className="grid">
              <div className="asset-choice-grid">
                <section className="asset-choice-panel">
                  <label>Datasets</label>
                  <div className="asset-choice-list" style={{ marginTop: 8 }}>
                    {assetCatalog.datasets.length === 0 && <div className="muted">No datasets found.</div>}
                    {assetCatalog.datasets.map((item) => (
                      <div
                        key={`pair-dataset-${item.id}`}
                        className={`asset-choice-item ${selection.dataset?.id === item.id ? "active" : ""}`}
                        onClick={() => setSelection((prev) => ({ ...prev, dataset: item }))}
                      >
                        <div className="asset-choice-name">{item.title || `Dataset #${item.id}`}</div>
                        <div className="muted">{shortText(item.description)}</div>
                        <div className="asset-choice-meta" style={{ marginTop: 8 }}>
                          <span className="mini-tag">ID {item.id}</span>
                          <span className="mini-tag">{item.priceWei} wei</span>
                          <span className="mini-tag">{item.active ? "Active" : "Inactive"}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>

                <section className="asset-choice-panel">
                  <label>Applications</label>
                  <div className="asset-choice-list" style={{ marginTop: 8 }}>
                    {assetCatalog.applications.length === 0 && <div className="muted">No applications found.</div>}
                    {assetCatalog.applications.map((item) => (
                      <div
                        key={`pair-application-${item.id}`}
                        className={`asset-choice-item ${selection.application?.id === item.id ? "active" : ""}`}
                        onClick={() => setSelection((prev) => ({ ...prev, application: item }))}
                      >
                        <div className="asset-choice-name">{item.title || `Application #${item.id}`}</div>
                        <div className="muted">{shortText(item.description)}</div>
                        <div className="asset-choice-meta" style={{ marginTop: 8 }}>
                          <span className="mini-tag">ID {item.id}</span>
                          <span className="mini-tag">{item.priceWei} wei</span>
                          <span className="mini-tag">{item.active ? "Active" : "Inactive"}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              </div>

              <div className="selection-summary">
                <div className="muted">
                  {summaryLabels.dataset}: {selection.dataset ? `${selection.dataset.title || `Dataset #${selection.dataset.id}`} (ID ${selection.dataset.id})` : "none"}
                </div>
                <div className="muted">
                  {summaryLabels.application}: {selection.application ? `${selection.application.title || `Application #${selection.application.id}`} (ID ${selection.application.id})` : "none"}
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="wrap">
            <div className="top">
              <h1 style={{ margin: 0 }}>DNAT Web CLI</h1>
              <p>Fill inputs directly and submit, no manual JSON body required.</p>
            </div>

            <div className="card grid">
              <label>Action</label>
              <select value={actionKey} onChange={(e) => setActionKey(e.target.value)}>
                {actions.map((a) => (
                  <option key={a.key} value={a.key}>{a.label}</option>
                ))}
              </select>

              {selected.key === "run-from-cids" && renderRunFromCidsPicker()}
              {selected.key === "purchase-access" &&
                renderAssetPairSelector(purchaseSelection, setPurchaseSelection, {
                  dataset: "Selected dataset",
                  application: "Selected application",
                })}

              {selected.fields.length > 0 && (
                <div className="fields">
                  {selected.fields.map((field) => (
                    <div key={field.name}>
                      <label>{field.label}</label>
                      {field.type === "checkbox" ? (
                        <div className="checkbox">
                          <input
                            type="checkbox"
                            checked={Boolean(fieldValues[field.name])}
                            onChange={(e) => updateField(field.name, e.target.checked)}
                          />
                          <span className="muted">Enabled</span>
                        </div>
                      ) : field.type === "file" ? (
                        <div>
                          <label className="file-picker">
                            <span className="file-picker-button">Choose File</span>
                            <span className="file-picker-name">
                              {selectedFiles[field.name]?.name || "No file selected"}
                            </span>
                            <input
                              type="file"
                              onChange={(e) => updateFile(field.name, e.target.files?.[0] || null)}
                            />
                          </label>
                        </div>
                      ) : (
                        <input
                          type="text"
                          value={fieldValues[field.name] ?? ""}
                          onChange={(e) => updateField(field.name, e.target.value)}
                        />
                      )}
                    </div>
                  ))}
                </div>
              )}

              {selected.fields.length === 0 && (
                <div className="muted">This action does not require input fields.</div>
              )}

              <button onClick={executeAction} disabled={loading || isMissingRequiredFile() || isMissingRunSelection() || isMissingPurchaseSelection()}>
                {loading ? "Running..." : "Execute"}
              </button>
            </div>

            <div className="card" style={{ marginTop: 14 }}>
              <strong>Response</strong>
              {renderResult()}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
