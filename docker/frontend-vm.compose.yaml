services:
  dnat-client:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dnat-client-local:latest
    container_name: dnat-client-local
    environment:
      WEB_PORT: ${WEB_PORT:-3001}
      RPC_URL: http://127.0.0.1:8545
      IPFS_API_URL: http://127.0.0.1:5001
      EXECUTOR_URL: ${EXECUTOR_URL:-http://dnat-executor:5000}
      BUILDER_URL: ${BUILDER_URL:-http://dnat-builder:5100}
      PRIVATE_KEY: ${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      WHEEL_CACHE_DIR: /app/smart-contract/wheel-cache
    ports:
      - "3001:3001"
      - "5001:5001"
      - "8080:8080"
      - "8545:8545"
    volumes:
      - dnat_ipfs_data:/data/ipfs
      - dnat_wheel_cache:/app/smart-contract/wheel-cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dnat-runtime
    restart: unless-stopped

  dnat-builder:
    build:
      context: ..
      dockerfile: build_vm_runtime/Dockerfile.build
    image: dnat-builder:latest
    container_name: dnat-builder
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    environment:
      WHEEL_CACHE_SOURCE_DIR: /var/dnat/wheel-cache
    volumes:
      - dnat_wheel_cache:/var/dnat/wheel-cache:ro
    networks:
      - dnat-runtime
    restart: unless-stopped

volumes:
  dnat_ipfs_data:
  dnat_wheel_cache:

networks:
  dnat-runtime:
    name: dnat-runtime
